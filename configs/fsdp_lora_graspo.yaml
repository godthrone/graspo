model:
  model_path: ${MODEL_PATH}
  trust_remote_code: true
  torch_dtype: bfloat16
  attn_implementation: null
  gradient_checkpointing: true
  chat_template_kwargs: {}

data:
  train_path: ${DATA_PATH}
  prompt_field: prompt
  ground_truth_field: ground_truth
  messages_field: messages
  max_prompt_length: 2048

lora:
  r: 16
  alpha: 32
  dropout: 0.1
  target_modules: null
  auto_target_modules: true
  bias: none
  task_type: CAUSAL_LM

reward:
  check_think: false
  check_json_markdown: true
  check_tool_call: false
  check_list_order: false
  marker_reward_weight: 10
  content_reward_weight: 100
  anti_useless_str_reward_weight: 1
  anti_useless_str_half_reward_len: 100

training:
  output_dir: ${OUTPUT_DIR}
  seed: 42
  total_epochs: 1
  max_steps: -1
  prompts_per_rank: 1
  group_size: 8
  train_batch_size: 4
  epochs_per_step: 4
  max_retry: 5
  learning_rate: 5.0e-6
  weight_decay: 0.01
  max_grad_norm: 1.0
  clip_eps: 0.2
  max_new_tokens: 1024
  temperature: 1.0
  top_p: 1.0
  save_steps: 50
  logging_steps: 1
  perfect_reward_threshold: 1.0
  dataloader_num_workers: 0

