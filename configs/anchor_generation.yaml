ontology:
  knowledge_path: data/anchor_seed/knowledge_ontology.json
  language_path: data/anchor_seed/language_ontology.json
  knowledge_root: null
  language_root: null

generation:
  output_path: anchor_bank/${BASE_MODEL_ID}/anchor_prompts.jsonl
  count: 1000
  seed: 42
  languages:
    - English
    - 简体中文
  task_types:
    - qa
    - explanation
    - reasoning
    - coding
    - translation
    - summarization
    - tool_use
  language_features_per_prompt: 2

teacher:
  model_path: ${MODEL_PATH}
  output_path: anchor_bank/${BASE_MODEL_ID}/anchor_answered.jsonl
  torch_dtype: bfloat16
  max_new_tokens: 512
  max_prompt_length: 2048
  temperature: 0.7
  top_p: 0.95

filter:
  output_path: anchor_bank/${BASE_MODEL_ID}/anchor_filtered.jsonl
  min_answer_chars: 8
  max_answer_chars: 4096

split:
  train_output_path: anchor_bank/${BASE_MODEL_ID}/anchor_train.jsonl
  eval_output_path: anchor_bank/${BASE_MODEL_ID}/anchor_eval.jsonl
  eval_ratio: 0.1
