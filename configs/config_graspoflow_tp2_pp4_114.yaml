# GraspoFlow TP+PP 混合测试 — Qwen3.6-27B tp=2 pp=4 on 114 H100
# 8 GPU: 4 PP stages × 2-way TP per stage
backend: graspoflow

model:
  model_path: /workspace/models/Qwen3.6-27B
  trust_remote_code: true
  torch_dtype: bfloat16
  gradient_checkpointing: true
  chat_template_kwargs:
    enable_thinking: false

data:
  train_path: /workspace/data/elam_graspo_train.jsonl
  max_prompt_length: 2048

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_preset: language_safe

reward:
  check_tool_call: true
  check_list_order: true
  marker_reward_weight: 10
  content_reward_weight: 100
  anti_useless_str_reward_weight: 1

training:
  output_dir: /workspace/outputs/graspoflow_tp2_pp4_114_longrun
  seed: 42
  training_epoch_count: 100
  max_steps: -1
  rollout_group_size: 8
  optimize_prompt_batch_size: 8     # 8 prompts × 8 groups = 64 experiences
  optimize_times_per_step: 3
  rollout_max_retry_times: 5
  learning_rate: 5.0e-6
  max_grad_norm: 1.0
  policy_ratio_clip_eps: 0.2
  max_new_tokens: 512
  temperature: 1.0
  top_p: 1.0
  save_steps: -1
  save_epoch_checkpoint: true
  logging_steps: 1
  perfect_skip_reward_threshold: 1.0
  skip_format_broken_groups: true
  dataloader_num_workers: 0

backend_config:
  graspoflow:
    tp_size: 2
    pp_size: 4
    placement_strategy: manual
    layer_ranges: [[0, 17], [17, 33], [33, 49], [49, 64]]   # 17-16-16-15, balances lm_head on Stage 3
    sequence_parallel: false
    pp_micro_batch_size: 2            # 64/2 = 32 microbatches, low bubble
    forward_batch_size: 64           # 8 prompts × 8 completions
    use_kv_cache_for_rollout: true
    empty_cache_after_rollout_split: false
    raw_log_enabled: true
    pp_schedule: one_f_one_b
    pp_max_inflight_microbatches: 0

launch:
  gpus: [0, 1, 2, 3, 4, 5, 6, 7]
  nproc_per_node: null
  master_addr: 127.0.0.1
  master_port: 29500
  env: {}
