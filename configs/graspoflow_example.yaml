# ─────────────────────────────────────────────────────────────
# GraspoFlow — TP+PP 统一训练框架 配置示例
# ─────────────────────────────────────────────────────────────
#
# GraspoFlow 将 TP 和 PP 统一为同一套 Flink 风格流水线框架：
#   pp_size=1, tp_size=1  → 单卡训练
#   pp_size=1, tp_size=N  → 纯 TP（注意力头切分）
#   pp_size=N, tp_size=1  → 纯 PP（层间流水线）
#   pp_size=M, tp_size=N  → TP+PP 混合
#
# 用 backend: graspoflow 切换到新框架。
# GraspoFlow 是唯一的训练后端。
# ─────────────────────────────────────────────────────────────

# ── 模式 1: 单卡训练 ──
# backend: graspoflow
# graspoflow:
#   tp_size: 1
#   pp_size: 1
# launch:
#   gpus: [0]
#   master_port: 29500

# ── 模式 2: 纯 TP（4 卡注意力切分）──
# backend: graspoflow
# graspoflow:
#   tp_size: 4
#   pp_size: 1
# launch:
#   gpus: [0, 1, 2, 3]
#   master_port: 29500

# ── 模式 3: 纯 PP（8 卡层间流水线）──
# backend: graspoflow
# graspoflow:
#   tp_size: 1
#   pp_size: 8
#   placement_strategy: qwen36_pp8_static
#   pp_schedule: one_f_one_b
#   pp_micro_batch_size: 1
# launch:
#   gpus: [0, 1, 2, 3, 4, 5, 6, 7]
#   master_port: 29500

# ── 当前激活: 模式 3 — 纯 PP=8（Qwen3.6-27B）──

backend: graspoflow

model:
  model_path: models/Qwen3.6-27B
  trust_remote_code: true
  torch_dtype: bfloat16
  gradient_checkpointing: true
  chat_template_kwargs:
    enable_thinking: false

data:
  train_path: data/train.jsonl
  max_prompt_length: 2048

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_preset: language_safe

reward:
  check_tool_call: true
  check_list_order: true
  marker_reward_weight: 10
  content_reward_weight: 100
  anti_useless_str_reward_weight: 1

training:
  output_dir: outputs/graspoflow_27b
  seed: 42
  max_epochs: 100
  max_steps: -1
  rollout_group_size: 8
  optimize_prompt_batch_size: 4
  optimize_iterations_per_step: 3
  rollout_max_retries: 5
  learning_rate: 5.0e-6
  max_grad_norm: 1.0
  policy_ratio_clip_eps: 0.2
  max_new_tokens: 512
  temperature: 1.0
  top_p: 1.0
  save_steps: -1
  save_checkpoint_every_epoch: true
  perfect_skip_reward_threshold: 1.0
  reject_unparseable_groups: true

graspoflow:
  tp_size: 1
  pp_size: 8
  placement_strategy: qwen36_pp8_static
  pp_schedule: one_f_one_b
  pp_micro_batch_size: 1
  forward_batch_size: 8
  use_kv_cache_for_rollout: true
  empty_cache_after_rollout_split: false
  raw_log_enabled: true

launch:
  gpus: [0, 1, 2, 3, 4, 5, 6, 7]
  nproc_per_node: null
  master_addr: 127.0.0.1
  master_port: 29500
  env: {}
