backend: auto

model:
  model_path: ${MODEL_PATH}
  trust_remote_code: true
  torch_dtype: bfloat16
  attn_implementation: null
  gradient_checkpointing: true
  chat_template_kwargs:
    enable_thinking: false

data:
  train_path: ${DATA_PATH}
  prompt_field: prompt
  ground_truth_field: ground_truth
  messages_field: messages
  max_prompt_length: 2048

lora:
  r: 16
  alpha: 32
  dropout: 0.1
  target_modules: null
  auto_target_modules: true
  bias: none
  task_type: CAUSAL_LM

reward:
  check_think: false
  check_json_markdown: true
  check_tool_call: false
  check_list_order: false
  marker_reward_weight: 10
  content_reward_weight: 100
  anti_useless_str_reward_weight: 1
  anti_useless_str_half_reward_len: 100

training:
  output_dir: ${OUTPUT_DIR}
  seed: 42
  training_epoch_count: 100
  max_steps: -1
  rollout_group_size: 8
  optimize_completion_batch_size: 4
  optimize_times_per_step: 4
  rollout_max_retry_times: 5
  learning_rate: 5.0e-6
  weight_decay: 0.01
  max_grad_norm: 1.0
  policy_ratio_clip_eps: 0.2
  max_new_tokens: 2048
  temperature: 1.0
  top_p: 1.0
  save_steps: 50
  logging_steps: 1
  perfect_skip_reward_threshold: 1.0
  dataloader_num_workers: 0
