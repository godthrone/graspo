[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "graspo"
version = "0.1.0"
description = "GRASPO training with a native Megatron tensor-parallel backend and a Hugging Face reference backend."
readme = "README.md"
requires-python = ">=3.11,<3.14"
license = { text = "MIT" }
authors = [{ name = "Godthrone" }]
dependencies = [
  "datasets>=3.0.0",
  "pandas>=2.0.0",
  "peft>=0.17.0",
  "pyyaml>=6.0.0",
  "safetensors>=0.4.0",
  "torch>=2.5.0,<2.6.0",
  "transformers>=4.53.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "ruff>=0.6.0",
]

[project.scripts]
graspo = "graspo.cli.app:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
